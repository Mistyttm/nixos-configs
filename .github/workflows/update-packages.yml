name: Dispatch Package Updates

on:
  schedule:
    # Run every 3 days at 03:00 UTC
    - cron: '0 3 */3 * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: dispatch-package-updates
  cancel-in-progress: true

jobs:
  dispatch-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Discover local packages
        id: discover
        run: |
          set -u

          packages_json=$(nix eval --json --apply 'pkgSet: builtins.attrNames pkgSet' .#packages.x86_64-linux 2>/dev/null || echo '[]')
          echo "packages_json=$packages_json" >> "$GITHUB_OUTPUT"

      - name: Dispatch per-package workflows
        uses: actions/github-script@v7
        env:
          PACKAGES_JSON: ${{ steps.discover.outputs.packages_json }}
        with:
          script: |
            let packages = [];

            try {
              packages = JSON.parse(process.env.PACKAGES_JSON || '[]');
            } catch (error) {
              core.warning(`Failed to parse package list: ${error.message}`);
            }

            for (const pkg of packages) {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'package-update.yml',
                  ref: context.ref.replace('refs/heads/', ''),
                  inputs: {
                    package: pkg,
                  },
                });

                core.info(`Dispatched package-update.yml for ${pkg}`);
              } catch (error) {
                core.warning(`Failed to dispatch package-update.yml for ${pkg}: ${error.message}`);
              }
            }

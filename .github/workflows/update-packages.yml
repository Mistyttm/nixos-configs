name: Update Local Packages

on:
  schedule:
    # Run every 3 days at 03:00 UTC
    - cron: '0 3 */3 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-local-packages
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      free_packages_json: ${{ steps.discover.outputs.free_packages_json }}
      unfree_packages_json: ${{ steps.discover.outputs.unfree_packages_json }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Discover free and unfree packages
        id: discover
        run: |
          set -euxo pipefail

          classify_packages() {
            nix eval --json --apply "
              pkgSet:
              let
                isUnfreeLicense = lic:
                  if lic == null then false
                  else if builtins.isList lic then builtins.any isUnfreeLicense lic
                  else if builtins.isAttrs lic then
                    if lic ? free then !(lic.free)
                    else (lic.shortName or \"\") == \"unfree\"
                      || (lic.spdxId or \"\") == \"unfree\"
                      || (lic.fullName or \"\") == \"Unfree\"
                  else false;
                isUnfreePackage = pkg: isUnfreeLicense (pkg.meta.license or null);
              in
                builtins.attrNames (builtins.filterAttrs (_: pkg: $1 pkg) pkgSet)
            " .#packages.x86_64-linux
          }

          echo "unfree_packages_json=$(classify_packages 'isUnfreePackage')" >> "$GITHUB_OUTPUT"
          echo "free_packages_json=$(classify_packages '(pkg: !(isUnfreePackage pkg))')" >> "$GITHUB_OUTPUT"

  update-free-package:
    if: needs.discover.outputs.free_packages_json != '[]'
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.free_packages_json) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: opinionatedcache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Update package version
        id: update_package
        run: |
          set -euo pipefail

          package='${{ matrix.package }}'
          attr="packages.x86_64-linux.${package}"
          pkg_file="packages/${package}/default.nix"

          # buildDotnetGlobalTool packages cannot be updated via nix-update because
          # the position Nix records resolves to the builder inside the nixpkgs store
          # path rather than our flake source. Detect this upfront and go straight to
          # the NuGet API instead.
          if grep -q 'buildDotnetGlobalTool' "$pkg_file" 2>/dev/null; then
            echo "Detected buildDotnetGlobalTool — using NuGet updater"
            nuget_name=$(grep -oP 'nugetName\s*=\s*"\K[^"]+' "$pkg_file")
            nuget_name_lc=$(echo "$nuget_name" | tr '[:upper:]' '[:lower:]')
            latest=$(curl -fsSL "https://api.nuget.org/v3-flatcontainer/${nuget_name_lc}/index.json" \
              | python3 -c 'import sys, json; print(json.load(sys.stdin)["versions"][-1])')
            echo "Latest NuGet version for ${nuget_name}: ${latest}"
            nix run nixpkgs#common-updater-scripts -- update-source-version "$attr" "$latest" --source-key=nupkg.src
          else
            nix run nixpkgs#nix-update -- --flake "$attr" --use-update-script \
              || nix run nixpkgs#nix-update -- --flake "$attr"
          fi

          nix fmt

          if git diff --quiet -- "packages/${package}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build updated package
        id: build_package
        if: steps.update_package.outputs.changed == 'true'
        run: |
          set -euo pipefail

          package='${{ matrix.package }}'
          package_file="packages/${package}"

          old_version=$(git diff -- "$package_file" | sed -nE 's/^-[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)";/\1/p' | head -n1)
          new_version=$(git diff -- "$package_file" | sed -nE 's/^\+[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)";/\1/p' | head -n1)

          if [ -n "${old_version}" ] && [ -n "${new_version}" ]; then
            echo "commit_message=update(packages/${package}): ${old_version} -> ${new_version}" >> "$GITHUB_OUTPUT"
          else
            echo "commit_message=update(packages/${package}): package update" >> "$GITHUB_OUTPUT"
          fi

          : > build.log
          if nix build ".#packages.x86_64-linux.${package}" --no-link --print-build-logs --json > >(tee build.json) 2> >(tee build.log >&2); then
            jq -r '.[].outputs[]' build.json \
              | xargs -I{} nix-store --query --requisites {} \
              | sort -u \
              | cachix push opinionatedcache
            echo "package_failed=false" >> "$GITHUB_OUTPUT"
          else
            log_excerpt=$(tail -n 120 build.log | sed 's/\r$//')
            {
              echo "failure_log_excerpt<<EOF"
              echo "${log_excerpt:-No stderr output captured. Check workflow logs for details.}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "failure_reason=build_failed" >> "$GITHUB_OUTPUT"
            echo "failure_summary=Build failed for this free package. Opening a PR for manual review." >> "$GITHUB_OUTPUT"
            echo "package_failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push package update
        if: steps.update_package.outputs.changed == 'true' && steps.build_package.outputs.package_failed != 'true'
        run: |
          set -euo pipefail

          package='${{ matrix.package }}'
          git add "packages/${package}"

          if git diff --cached --quiet; then
            echo "No staged changes to commit"
            exit 0
          fi

          git commit -m "${{ steps.build_package.outputs.commit_message }}"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Upload build log on failure
        if: steps.update_package.outputs.changed == 'true' && steps.build_package.outputs.package_failed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: package-build-log-${{ matrix.package }}
          path: |
            build.log
            build.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Open PR on build failure
        if: steps.update_package.outputs.changed == 'true' && steps.build_package.outputs.package_failed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/package-update-${{ matrix.package }}-build-failure
          delete-branch: false
          title: "${{ steps.build_package.outputs.commit_message }}"
          commit-message: "${{ steps.build_package.outputs.commit_message }}"
          body: |
            Automated update for `${{ matrix.package }}` encountered a build failure.

            ${{ steps.build_package.outputs.failure_summary }}

            ```text
            ${{ steps.build_package.outputs.failure_log_excerpt }}
            ```

            Full logs are available as workflow artifact `package-build-log-${{ matrix.package }}`.
          add-paths: |
            packages/${{ matrix.package }}

  update-unfree-package:
    if: needs.discover.outputs.unfree_packages_json != '[]'
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.unfree_packages_json) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: opinionatedcache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Update package version
        id: update_package
        run: |
          set -euo pipefail

          package='${{ matrix.package }}'
          attr="packages.x86_64-linux.${package}"
          pkg_file="packages/${package}/default.nix"

          if grep -q 'buildDotnetGlobalTool' "$pkg_file" 2>/dev/null; then
            echo "Detected buildDotnetGlobalTool — using NuGet updater"
            nuget_name=$(grep -oP 'nugetName\s*=\s*"\K[^"]+' "$pkg_file")
            nuget_name_lc=$(echo "$nuget_name" | tr '[:upper:]' '[:lower:]')
            latest=$(curl -fsSL "https://api.nuget.org/v3-flatcontainer/${nuget_name_lc}/index.json" \
              | python3 -c 'import sys, json; print(json.load(sys.stdin)["versions"][-1])')
            echo "Latest NuGet version for ${nuget_name}: ${latest}"
            nix run nixpkgs#common-updater-scripts -- update-source-version "$attr" "$latest" --source-key=nupkg.src
          else
            nix run nixpkgs#nix-update -- --flake "$attr" --use-update-script \
              || nix run nixpkgs#nix-update -- --flake "$attr"
          fi

          nix fmt

          if git diff --quiet -- "packages/${package}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare PR metadata
        id: build_package
        if: steps.update_package.outputs.changed == 'true'
        run: |
          set -euo pipefail

          package='${{ matrix.package }}'
          package_file="packages/${package}"

          old_version=$(git diff -- "$package_file" | sed -nE 's/^-[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)";/\1/p' | head -n1)
          new_version=$(git diff -- "$package_file" | sed -nE 's/^\+[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)";/\1/p' | head -n1)

          if [ -n "${old_version}" ] && [ -n "${new_version}" ]; then
            echo "commit_message=update(packages/${package}): ${old_version} -> ${new_version}" >> "$GITHUB_OUTPUT"
          else
            echo "commit_message=update(packages/${package}): package update" >> "$GITHUB_OUTPUT"
          fi

          echo "package_failed=true" >> "$GITHUB_OUTPUT"
          echo "failure_summary=Package is marked unfree — skipping CI build and opening a PR for manual testing." >> "$GITHUB_OUTPUT"

      - name: Open PR for manual testing
        if: steps.update_package.outputs.changed == 'true' && steps.build_package.outputs.package_failed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/package-update-${{ matrix.package }}-build-failure
          delete-branch: false
          title: "${{ steps.build_package.outputs.commit_message }}"
          commit-message: "${{ steps.build_package.outputs.commit_message }}"
          body: |
            Automated update for unfree package `${{ matrix.package }}`.

            ${{ steps.build_package.outputs.failure_summary }}
          add-paths: |
            packages/${{ matrix.package }}

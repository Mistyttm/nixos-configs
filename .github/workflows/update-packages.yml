name: Update Local Packages

on:
  schedule:
    # Run every 3 days at 03:00 UTC
    - cron: '0 3 */3 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-local-packages
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      free_packages_json: ${{ steps.discover.outputs.free_packages_json }}
      unfree_packages_json: ${{ steps.discover.outputs.unfree_packages_json }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Discover free and unfree packages
        id: discover
        run: |
          set -euxo pipefail

          unfree_packages_json=$(nix eval --json --apply '
            pkgSet:
            let
              isUnfreeLicense = lic:
                if lic == null then false
                else if builtins.isList lic then builtins.any isUnfreeLicense lic
                else if builtins.isAttrs lic then
                  if lic ? free then !(lic.free)
                  else (lic.shortName or "") == "unfree"
                    || (lic.spdxId or "") == "unfree"
                    || (lic.fullName or "") == "Unfree"
                else false;
              isUnfreePackage = pkg: isUnfreeLicense (pkg.meta.license or null);
            in
              builtins.attrNames (builtins.filterAttrs (_: pkg: isUnfreePackage pkg) pkgSet)
          ' .#packages.x86_64-linux)

          free_packages_json=$(nix eval --json --apply '
            pkgSet:
            let
              isUnfreeLicense = lic:
                if lic == null then false
                else if builtins.isList lic then builtins.any isUnfreeLicense lic
                else if builtins.isAttrs lic then
                  if lic ? free then !(lic.free)
                  else (lic.shortName or "") == "unfree"
                    || (lic.spdxId or "") == "unfree"
                    || (lic.fullName or "") == "Unfree"
                else false;
              isUnfreePackage = pkg: isUnfreeLicense (pkg.meta.license or null);
            in
              builtins.attrNames (builtins.filterAttrs (_: pkg: !(isUnfreePackage pkg)) pkgSet)
          ' .#packages.x86_64-linux)

          echo "free_packages_json=$free_packages_json" >> "$GITHUB_OUTPUT"
          echo "unfree_packages_json=$unfree_packages_json" >> "$GITHUB_OUTPUT"

  update-free-package:
    if: needs.discover.outputs.free_packages_json != '[]'
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.free_packages_json) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: opinionatedcache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Update package version
        id: update_package
        run: |
          set -euxo pipefail

          package='${{ matrix.package }}'
          attr="packages.x86_64-linux.${package}"

          if ! nix run nixpkgs#nix-update -- --flake "$attr" --use-update-script; then
            if ! nix run nixpkgs#nix-update -- --flake "$attr" --use-github-releases; then
              nix run nixpkgs#nix-update -- --flake "$attr"
            fi
          fi
          nix fmt

          if git diff --quiet -- "packages/${package}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          exit 0

      - name: Build updated package
        id: build_package
        if: steps.update_package.outputs.changed == 'true'
        run: |
          set -euxo pipefail

          package='${{ matrix.package }}'
          package_file="packages/${package}"

          old_version=$(git diff -- "$package_file" | sed -nE 's/^-+[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)";/\1/p' | head -n1)
          new_version=$(git diff -- "$package_file" | sed -nE 's/^\++[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)";/\1/p' | head -n1)

          if [ -n "${old_version}" ] && [ -n "${new_version}" ]; then
            echo "commit_message=update(packages/${package}): ${old_version} -> ${new_version}" >> "$GITHUB_OUTPUT"
          else
            echo "commit_message=update(packages/${package}): package update" >> "$GITHUB_OUTPUT"
          fi

          : > build.log
          if nix build ".#packages.x86_64-linux.${package}" --no-link --print-build-logs --json > >(tee build.json) 2> >(tee build.log >&2); then
            jq -r '.[].outputs[]' build.json > realised-paths.txt
            if [ -s realised-paths.txt ]; then
              while read -r path; do
                nix-store --query --requisites "$path"
              done < realised-paths.txt | sort -u > closure-paths.txt

              if [ -s closure-paths.txt ]; then
                cachix push opinionatedcache < closure-paths.txt
              fi
            fi

            echo "package_failed=false" >> "$GITHUB_OUTPUT"
          else
            log_excerpt=$(tail -n 120 build.log | sed 's/\r$//')
            if [ -z "$log_excerpt" ]; then
              log_excerpt="No stderr build output was captured. Check the workflow step logs and artifact for details."
            fi
            {
              echo "failure_log_excerpt<<EOF"
              echo "$log_excerpt"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"

            echo "failure_reason=build_failed" >> "$GITHUB_OUTPUT"
            echo "failure_summary=Build failed for this free package. Opening a PR for testing." >> "$GITHUB_OUTPUT"
            echo "package_failed=true" >> "$GITHUB_OUTPUT"
          fi

          exit 0

      - name: Commit and push package update to main
        if: steps.update_package.outputs.changed == 'true' && steps.build_package.outputs.package_failed != 'true'
        run: |
          set -euxo pipefail

          package='${{ matrix.package }}'
          git add "packages/${package}"

          if git diff --cached --quiet; then
            echo "No package changes to commit"
            exit 0
          fi

          git commit -m "${{ steps.build_package.outputs.commit_message }}"
          git pull --rebase origin main
          git push origin HEAD:main

          exit 0

      - name: Upload build log artifact on failure
        if: steps.update_package.outputs.changed == 'true' && steps.build_package.outputs.package_failed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: package-build-log-${{ matrix.package }}
          path: |
            build.log
            build.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Create PR when package build fails
        if: steps.update_package.outputs.changed == 'true' && steps.build_package.outputs.package_failed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/package-update-${{ matrix.package }}-build-failure
          delete-branch: false
          title: "${{ steps.build_package.outputs.commit_message }}"
          commit-message: "${{ steps.build_package.outputs.commit_message }}"
          body: |
            Automated update for free package `${{ matrix.package }}` found a build failure.

            ${{ steps.build_package.outputs.failure_summary }}

            Build log excerpt (tail):
            ```text
            ${{ steps.build_package.outputs.failure_log_excerpt }}
            ```

            Full logs are available as workflow artifact `package-build-log-${{ matrix.package }}`.

            This PR is opened for manual review and fixes.
          add-paths: |
            packages/${{ matrix.package }}

  update-unfree-package:
    if: needs.discover.outputs.unfree_packages_json != '[]'
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.unfree_packages_json) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: opinionatedcache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Update package version
        id: update_package
        run: |
          set -euxo pipefail

          package='${{ matrix.package }}'
          attr="packages.x86_64-linux.${package}"

          if ! nix run nixpkgs#nix-update -- --flake "$attr" --use-update-script; then
            if ! nix run nixpkgs#nix-update -- --flake "$attr" --use-github-releases; then
              nix run nixpkgs#nix-update -- --flake "$attr"
            fi
          fi
          nix fmt

          if git diff --quiet -- "packages/${package}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          exit 0

      - name: Mark unfree package for testing PR
        id: build_package
        if: steps.update_package.outputs.changed == 'true'
        run: |
          set -euxo pipefail

          package='${{ matrix.package }}'
          package_file="packages/${package}"

          old_version=$(git diff -- "$package_file" | sed -nE 's/^-+[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)";/\1/p' | head -n1)
          new_version=$(git diff -- "$package_file" | sed -nE 's/^\++[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)";/\1/p' | head -n1)

          if [ -n "${old_version}" ] && [ -n "${new_version}" ]; then
            echo "commit_message=update(packages/${package}): ${old_version} -> ${new_version}" >> "$GITHUB_OUTPUT"
          else
            echo "commit_message=update(packages/${package}): package update" >> "$GITHUB_OUTPUT"
          fi

          : > build.log
          echo "failure_reason=unfree" >> "$GITHUB_OUTPUT"
          echo "failure_summary=Package is marked unfree. Skipping CI build and opening a PR for manual testing." >> "$GITHUB_OUTPUT"
          echo "failure_log_excerpt=Build skipped because package meta.license is unfree." >> "$GITHUB_OUTPUT"
          echo "package_failed=true" >> "$GITHUB_OUTPUT"

          exit 0

      - name: Commit and push package update to main
        if: steps.update_package.outputs.changed == 'true' && steps.build_package.outputs.package_failed != 'true'
        run: |
          set -euxo pipefail

          package='${{ matrix.package }}'
          git add "packages/${package}"

          if git diff --cached --quiet; then
            echo "No package changes to commit"
            exit 0
          fi

          git commit -m "${{ steps.build_package.outputs.commit_message }}"
          git pull --rebase origin main
          git push origin HEAD:main

          exit 0

      - name: Upload build log artifact on failure
        if: steps.update_package.outputs.changed == 'true' && steps.build_package.outputs.package_failed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: package-build-log-${{ matrix.package }}
          path: |
            build.log
            build.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Create PR when package build fails
        if: steps.update_package.outputs.changed == 'true' && steps.build_package.outputs.package_failed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/package-update-${{ matrix.package }}-build-failure
          delete-branch: false
          title: "${{ steps.build_package.outputs.commit_message }}"
          commit-message: "${{ steps.build_package.outputs.commit_message }}"
          body: |
            Automated update for unfree package `${{ matrix.package }}` requires a testing PR.

            ${{ steps.build_package.outputs.failure_summary }}

            Build status detail:
            ```text
            ${{ steps.build_package.outputs.failure_log_excerpt }}
            ```

            This PR is opened for manual review and fixes.
          add-paths: |
            packages/${{ matrix.package }}

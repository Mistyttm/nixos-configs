name: Update Local Packages

on:
  schedule:
    # Run every 3 days at 03:00 UTC
    - cron: "0 3 */3 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-local-packages
  cancel-in-progress: true

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      free_packages_json: ${{ steps.classify.outputs.free_packages_json }}
      unfree_packages_json: ${{ steps.classify.outputs.unfree_packages_json }}
    env:
      # ── Packages to update ──────────────────────────────────────────────────
      # One package name per line. Free/unfree is detected automatically from
      # each package's meta.license — no manual tagging needed.
      PACKAGES: |
        dispatcharr
        i-sponsor-block-tv
        jellystat
        langhire
        proton-cachyos
        proton-ge-rtsp
        vanilla-wiiu
      # ────────────────────────────────────────────────────────────────────────
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Lix
        uses: samueldr/lix-gha-installer-action@v2026-02-22
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            max-jobs = auto
            cores = 0
            substitute = true
            builders =

      - name: Classify packages as free or unfree
        id: classify
        run: |
          set -euxo pipefail

          # Strip blank lines and comments, build a Nix list literal
          nix_list=$(echo "$PACKAGES" \
            | grep -v '^\s*#' \
            | grep -v '^\s*$' \
            | awk '{printf "\"%s\" ", $0}' \
            | sed 's/^/[ /; s/ *$/]/')

          classify_packages() {
            nix eval --json --apply "
              pkgSet:
              let
                packages = ${nix_list};
                isUnfreeLicense = lic:
                  if lic == null then false
                  else if builtins.isList lic then builtins.any isUnfreeLicense lic
                  else if builtins.isAttrs lic then
                    if lic ? free then !(lic.free)
                    else (lic.shortName or \"\") == \"unfree\"
                      || (lic.spdxId or \"\") == \"unfree\"
                      || (lic.fullName or \"\") == \"Unfree\"
                  else false;
                isUnfreePackage = pkg: isUnfreeLicense (pkg.meta.license or null);
              in
                builtins.filter (name: $1 (pkgSet.\${name})) packages
            " .#packages.x86_64-linux
          }

          echo "unfree_packages_json=$(classify_packages 'isUnfreePackage')" >> "$GITHUB_OUTPUT"
          echo "free_packages_json=$(classify_packages '(pkg: !(isUnfreePackage pkg))')" >> "$GITHUB_OUTPUT"

  update-free-package:
    if: needs.classify.outputs.free_packages_json != '[]'
    needs: classify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.classify.outputs.free_packages_json) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Lix
        uses: samueldr/lix-gha-installer-action@v2026-02-22
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            max-jobs = auto
            cores = 0
            substitute = true
            builders =

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: opinionatedcache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Update package version
        id: update_package
        run: |
          set -euo pipefail

          package='${{ matrix.package }}'
          attr="packages.x86_64-linux.${package}"

          if ! nix run nixpkgs#nix-update -- "$attr" --flake; then
            update_script_json=$(nix eval --json ".#${attr}.passthru.updateScript")
            mapfile -t update_script_command < <(
              jq -r '
                if type == "string" then
                  .
                elif type == "array" then
                  .[]
                elif type == "object" and has("command") then
                  .command[]
                else
                  error("unsupported updateScript shape")
                end
              ' <<<"$update_script_json"
            )

            if [ "${#update_script_command[@]}" -eq 0 ]; then
              echo "No executable update script found for $attr" >&2
              exit 1
            fi

            UPDATE_NIX_ATTR_PATH="$attr" "${update_script_command[@]}"
          fi

          nix fmt -- "packages/${package}"

          if git diff --quiet -- "packages/${package}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build updated package
        id: build_package
        if: steps.update_package.outputs.changed == 'true'
        run: |
          set -euo pipefail

          package='${{ matrix.package }}'
          package_file="packages/${package}"

          old_version=$(git diff -- "$package_file" | sed -nE 's/^-[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)";/\1/p' | head -n1)
          new_version=$(git diff -- "$package_file" | sed -nE 's/^\+[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)";/\1/p' | head -n1)

          if [ -n "${old_version}" ] && [ -n "${new_version}" ]; then
            echo "commit_message=update(packages/${package}): ${old_version} -> ${new_version}" >> "$GITHUB_OUTPUT"
          else
            echo "commit_message=update(packages/${package}): package update" >> "$GITHUB_OUTPUT"
          fi

          : > build.log
          if nix build ".#packages.x86_64-linux.${package}" --no-link --print-build-logs --json > >(tee build.json) 2> >(tee build.log >&2); then
            jq -r '.[].outputs[]' build.json \
              | xargs -I{} nix-store --query --requisites {} \
              | sort -u \
              | cachix push opinionatedcache
            echo "package_failed=false" >> "$GITHUB_OUTPUT"
          else
            log_excerpt=$(tail -n 120 build.log | sed 's/\r$//')
            {
              echo "failure_log_excerpt<<EOF"
              echo "${log_excerpt:-No stderr output captured. Check workflow logs for details.}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "failure_reason=build_failed" >> "$GITHUB_OUTPUT"
            echo "failure_summary=Build failed for this free package. Opening a PR for manual review." >> "$GITHUB_OUTPUT"
            echo "package_failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push package update
        if: steps.update_package.outputs.changed == 'true' && steps.build_package.outputs.package_failed != 'true'
        run: |
          set -euo pipefail

          package='${{ matrix.package }}'
          git add "packages/${package}"

          if git diff --cached --quiet; then
            echo "No staged changes to commit"
            exit 0
          fi

          git commit -m "${{ steps.build_package.outputs.commit_message }}"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Upload build log on failure
        if: steps.update_package.outputs.changed == 'true' && steps.build_package.outputs.package_failed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: package-build-log-${{ matrix.package }}
          path: |
            build.log
            build.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Open PR on build failure
        if: steps.update_package.outputs.changed == 'true' && steps.build_package.outputs.package_failed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/package-update-${{ matrix.package }}-build-failure
          delete-branch: false
          title: "${{ steps.build_package.outputs.commit_message }}"
          commit-message: "${{ steps.build_package.outputs.commit_message }}"
          body: |
            Automated update for `${{ matrix.package }}` encountered a build failure.

            ${{ steps.build_package.outputs.failure_summary }}

            ```text
            ${{ steps.build_package.outputs.failure_log_excerpt }}
            ```

            Full logs are available as workflow artifact `package-build-log-${{ matrix.package }}`.
          add-paths: |
            packages/${{ matrix.package }}

  update-unfree-package:
    if: needs.classify.outputs.unfree_packages_json != '[]'
    needs: classify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.classify.outputs.unfree_packages_json) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Lix
        uses: samueldr/lix-gha-installer-action@v2026-02-22
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            max-jobs = auto
            cores = 0
            substitute = true
            builders =

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: opinionatedcache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Update package version
        id: update_package
        run: |
          set -euo pipefail

          package='${{ matrix.package }}'
          attr="packages.x86_64-linux.${package}"

          if ! nix run nixpkgs#nix-update -- "$attr" --flake; then
            update_script_json=$(nix eval --json ".#${attr}.passthru.updateScript")
            mapfile -t update_script_command < <(
              jq -r '
                if type == "string" then
                  .
                elif type == "array" then
                  .[]
                elif type == "object" and has("command") then
                  .command[]
                else
                  error("unsupported updateScript shape")
                end
              ' <<<"$update_script_json"
            )

            if [ "${#update_script_command[@]}" -eq 0 ]; then
              echo "No executable update script found for $attr" >&2
              exit 1
            fi

            UPDATE_NIX_ATTR_PATH="$attr" "${update_script_command[@]}"
          fi

          nix fmt -- "packages/${package}"

          if git diff --quiet -- "packages/${package}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare PR metadata
        id: build_package
        if: steps.update_package.outputs.changed == 'true'
        run: |
          set -euo pipefail

          package='${{ matrix.package }}'
          package_file="packages/${package}"

          old_version=$(git diff -- "$package_file" | sed -nE 's/^-[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)";/\1/p' | head -n1)
          new_version=$(git diff -- "$package_file" | sed -nE 's/^\+[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)";/\1/p' | head -n1)

          if [ -n "${old_version}" ] && [ -n "${new_version}" ]; then
            echo "commit_message=update(packages/${package}): ${old_version} -> ${new_version}" >> "$GITHUB_OUTPUT"
          else
            echo "commit_message=update(packages/${package}): package update" >> "$GITHUB_OUTPUT"
          fi

          echo "package_failed=true" >> "$GITHUB_OUTPUT"
          echo "failure_summary=Package is marked unfree — skipping CI build and opening a PR for manual testing." >> "$GITHUB_OUTPUT"

      - name: Open PR for manual testing
        if: steps.update_package.outputs.changed == 'true' && steps.build_package.outputs.package_failed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/package-update-${{ matrix.package }}-build-failure
          delete-branch: false
          title: "${{ steps.build_package.outputs.commit_message }}"
          commit-message: "${{ steps.build_package.outputs.commit_message }}"
          body: |
            Automated update for unfree package `${{ matrix.package }}`.

            ${{ steps.build_package.outputs.failure_summary }}
          add-paths: |
            packages/${{ matrix.package }}

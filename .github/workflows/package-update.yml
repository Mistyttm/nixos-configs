name: Package Update

on:
  workflow_dispatch:
    inputs:
      package:
        description: Local package attribute name under packages.x86_64-linux
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: package-update-${{ inputs.package }}
  cancel-in-progress: true

jobs:
  update-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: opinionatedcache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Update package version
        id: update_package
        continue-on-error: true
        run: |
          set +e

          package='${{ inputs.package }}'
          attr="packages.x86_64-linux.${package}"

          nix run nixpkgs#nix-update -- --flake "$attr" --use-github-releases
          nix fmt

          if git diff --quiet -- "packages/${package}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          exit 0

      - name: Build updated package
        id: build_package
        if: steps.update_package.outputs.changed == 'true'
        continue-on-error: true
        run: |
          set +euo pipefail

          package='${{ inputs.package }}'
          package_file="packages/${package}"

          old_version=$(git diff -- "$package_file" | sed -nE 's/^-+[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)";/\1/p' | head -n1)
          new_version=$(git diff -- "$package_file" | sed -nE 's/^\++[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)";/\1/p' | head -n1)

          if [ -n "${old_version}" ] && [ -n "${new_version}" ]; then
            echo "commit_message=update(packages/${package}): ${old_version} -> ${new_version}" >> "$GITHUB_OUTPUT"
          else
            echo "commit_message=update(packages/${package}): package update" >> "$GITHUB_OUTPUT"
          fi

          if nix build ".#packages.x86_64-linux.${package}" --no-link --json > build.json; then
            jq -r '.[].outputs[]' build.json > realised-paths.txt
            if [ -s realised-paths.txt ]; then
              while read -r path; do
                nix-store --query --requisites "$path"
              done < realised-paths.txt | sort -u > closure-paths.txt

              if [ -s closure-paths.txt ]; then
                cachix push opinionatedcache < closure-paths.txt || true
              fi
            fi

            echo "package_failed=false" >> "$GITHUB_OUTPUT"
          else
            echo "package_failed=true" >> "$GITHUB_OUTPUT"
          fi

          exit 0

      - name: Commit and push package update to main
        if: steps.update_package.outputs.changed == 'true' && steps.build_package.outputs.package_failed != 'true'
        continue-on-error: true
        run: |
          set +e

          package='${{ inputs.package }}'
          git add "packages/${package}"

          if git diff --cached --quiet; then
            echo "No package changes to commit"
            exit 0
          fi

          git commit -m "${{ steps.build_package.outputs.commit_message }}"
          git pull --rebase origin main || true
          git push origin HEAD:main || true

          exit 0

      - name: Create PR when package build fails
        if: steps.update_package.outputs.changed == 'true' && steps.build_package.outputs.package_failed == 'true'
        uses: peter-evans/create-pull-request@v7
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/package-update-${{ inputs.package }}-build-failure
          delete-branch: false
          title: "${{ steps.build_package.outputs.commit_message }}"
          commit-message: "${{ steps.build_package.outputs.commit_message }}"
          body: |
            Automated update for package `${{ inputs.package }}` found a build failure.

            This PR is opened for manual review and fixes.
          add-paths: |
            packages/${{ inputs.package }}
